<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Learn Mahjong{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4">
  <a class="navbar-brand fw-bold" href="/">🀄 Learn Mahjong</a>
  <div class="ms-auto d-flex gap-2">
    <a href="/" class="btn btn-sm btn-outline-secondary {% if request.endpoint == 'home' %}active{% endif %}">Home</a>
    <a href="/learn/1" class="btn btn-sm btn-outline-secondary {% if request.endpoint == 'learn' and request.view_args.get('lesson_num') != 6 %}active{% endif %}">Learn</a>
    <a href="/learn/6" class="btn btn-sm btn-outline-secondary {% if request.endpoint == 'learn' and request.view_args.get('lesson_num') == 6 %}active{% endif %}">Review</a>
    <a href="/practice/1" class="btn btn-sm btn-outline-secondary {% if request.endpoint in ['practice', 'practice_answer'] %}active{% endif %}">Practice</a>
    <a href="/resume" class="btn btn-sm btn-outline-secondary {% if request.endpoint == 'quiz' %}active{% endif %}">Quiz</a>
    <a href="/results" class="btn btn-sm btn-outline-secondary {% if request.endpoint == 'results' %}active{% endif %}">Results</a>
  </div>
</nav>

<main class="container py-5" style="max-width:700px">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
